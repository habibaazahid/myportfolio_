<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Habiba Zahid — Frontend Developer</title>
<meta name="description" content="Aspiring Frontend Developer & CS Student. 6+ years freelance, ⭐5-star Upwork."/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<!-- React + Babel for JSX -->
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════
   HABIBA ZAHID — PORTFOLIO v13
   React SPA · WebGL Background · Interactive Terminal
   Magnetic Cursor · 3D Skills · Sound Engine
   Floating Dock · Dot Nav · Konami Easter Egg
═══════════════════════════════════════════════════ */
:root{
  --bg:#050c1d;--bg2:#060f20;--surf:#0b1829;--surf2:#0f1f32;
  --e1:rgba(91,168,255,.08);--e2:rgba(91,168,255,.18);--e3:rgba(91,168,255,.32);
  --blue:#5ba8ff;--blue2:#3b82f6;--violet:#a78bfa;--pink:#f472b6;
  --teal:#2dd4bf;--amber:#fbbf24;--green:#34d399;--red:#f87171;
  --tx:#e2eeff;--mu1:#7a99be;--mu2:#3d5470;
  --fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;--fm:'JetBrains Mono',monospace;
  --sp:cubic-bezier(.16,1,.3,1);--sm:cubic-bezier(.4,0,.2,1);
  --glow-blue:0 0 40px rgba(91,168,255,.25);
}
[data-theme=light]{
  --bg:#f0f4ff;--bg2:#e8eeff;--surf:#fff;--surf2:#f5f8ff;
  --e1:rgba(59,130,246,.1);--e2:rgba(59,130,246,.22);--e3:rgba(59,130,246,.38);
  --tx:#0f172a;--mu1:#475569;--mu2:#94a3b8;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--fb);background:var(--bg);color:var(--tx);overflow-x:hidden;cursor:none;transition:background .4s,color .3s}
@media(hover:none){body{cursor:auto}}
a{color:inherit;text-decoration:none}
button,input,textarea{font-family:var(--fb);border:none;outline:none;background:transparent;cursor:pointer;color:inherit}
::selection{background:rgba(91,168,255,.28)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:linear-gradient(var(--violet),var(--blue),var(--teal));border-radius:2px}

/* LOADER */
#loader{position:fixed;inset:0;z-index:99999;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;transition:opacity .8s var(--sp),transform .8s var(--sp)}
#loader.out{opacity:0;pointer-events:none;transform:scale(.96)}
.ld-name{font-family:var(--fh);font-size:clamp(2rem,5vw,3.5rem);font-weight:800;background:linear-gradient(135deg,var(--blue),var(--violet),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-2px;animation:ldUp .6s .2s var(--sp) both}
.ld-bar{width:200px;height:1.5px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden;animation:ldUp .5s .5s ease both}
.ld-fill{height:100%;width:0;background:linear-gradient(90deg,var(--violet),var(--blue),var(--teal));animation:ldFill 1.4s .6s var(--sp) forwards}
.ld-txt{font-family:var(--fm);font-size:.58rem;color:var(--mu2);letter-spacing:.22em;text-transform:uppercase;animation:ldUp .5s .7s ease both}
.ld-pct{font-family:var(--fm);font-size:.72rem;color:var(--blue);animation:ldUp .5s .8s ease both}
@keyframes ldUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@keyframes ldFill{to{width:100%}}

/* CANVAS BACKGROUNDS */
#webgl-bg{position:fixed;inset:0;z-index:0;pointer-events:none}
#particle-canvas{position:fixed;inset:0;z-index:1;pointer-events:none}
.grain{position:fixed;inset:0;z-index:2;pointer-events:none;opacity:.018;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
.dot-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(rgba(91,168,255,.055) 1px,transparent 1px);background-size:44px 44px;mask-image:radial-gradient(ellipse 90% 90% at 50% 45%,black 10%,transparent 100%)}
[data-theme=light] .dot-grid{opacity:.3}

/* CUSTOM CURSOR */
#cur-dot,#cur-ring,#cur-glow{position:fixed;border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);opacity:0;top:-200px;left:-200px}
#cur-dot{width:6px;height:6px;background:var(--teal);box-shadow:0 0 12px var(--teal);transition:width .18s,height .18s,background .2s,opacity .22s;z-index:9999}
#cur-ring{width:34px;height:34px;border:1.5px solid rgba(91,168,255,.45);transition:width .42s var(--sp),height .42s var(--sp),border-color .28s,opacity .22s}
#cur-glow{width:120px;height:120px;background:radial-gradient(circle,rgba(91,168,255,.06),transparent 70%);transition:opacity .3s;pointer-events:none}
#cur-label{position:fixed;transform:translate(16px,-50%);font-family:var(--fm);font-size:.58rem;color:var(--blue);letter-spacing:.1em;pointer-events:none;z-index:9999;opacity:0;transition:opacity .18s;white-space:nowrap;border:1px solid var(--e2);padding:3px 9px;border-radius:4px;background:var(--surf);backdrop-filter:blur(8px);top:-200px;left:-200px}
body.cur-active #cur-dot,body.cur-active #cur-ring,body.cur-active #cur-glow{opacity:1}
body.cur-project #cur-dot{width:0;height:0;opacity:0}
body.cur-project #cur-ring{width:58px;height:58px;border-color:rgba(244,114,182,.55)}
body.cur-project #cur-label{opacity:1}
body.cur-link #cur-dot{background:var(--blue)}
body.cur-link #cur-ring{width:46px;height:46px;border-color:rgba(45,212,191,.65)}
body.cur-text #cur-dot{width:2px;height:18px;border-radius:1px;background:var(--blue)}
/* PROGRESS + SCROLL NAV */
#scroll-prog{position:fixed;top:0;left:0;height:2px;width:0;z-index:8999;background:linear-gradient(90deg,var(--violet),var(--blue),var(--teal));box-shadow:0 0 12px rgba(91,168,255,.6)}
#dot-nav{position:fixed;right:22px;top:50%;transform:translateY(-50%);z-index:800;display:flex;flex-direction:column;gap:10px;align-items:center}
.dn-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid rgba(91,168,255,.3);background:transparent;cursor:pointer;transition:all .3s var(--sp);position:relative}
.dn-dot.active{background:var(--blue);border-color:var(--blue);box-shadow:0 0 10px var(--blue)}
.dn-dot:hover::after{content:attr(data-label);position:absolute;right:18px;top:50%;transform:translateY(-50%);font-family:var(--fm);font-size:.58rem;color:var(--tx);background:var(--surf);border:1px solid var(--e1);padding:3px 9px;border-radius:4px;white-space:nowrap;pointer-events:none}

/* FLOATING DOCK */
#dock{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:900;display:flex;align-items:flex-end;gap:6px;padding:10px 14px;background:rgba(11,24,41,.8);border:1px solid var(--e2);border-radius:20px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
[data-theme=light] #dock{background:rgba(255,255,255,.85)}
.dock-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:transform .25s var(--sp);position:relative}
.dock-item:hover{transform:translateY(-10px) scale(1.22)}
.dock-item:hover .dock-label{opacity:1;transform:translateY(0)}
.dock-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;border:1px solid var(--e1);background:var(--surf2);transition:box-shadow .3s}
.dock-item:hover .dock-icon{box-shadow:0 0 20px rgba(91,168,255,.3)}
.dock-label{font-family:var(--fm);font-size:.55rem;color:var(--mu1);letter-spacing:.06em;opacity:0;transform:translateY(4px);transition:all .2s;position:absolute;bottom:calc(100% + 6px);white-space:nowrap;background:var(--surf);border:1px solid var(--e1);padding:2px 7px;border-radius:4px}

/* NAV */
#nav{position:fixed;top:0;left:0;right:0;z-index:800;height:66px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 52px;transition:height .35s var(--sp),background .4s,transform .4s var(--sp)}
#nav::after{content:'';position:absolute;bottom:0;left:52px;right:52px;height:1px;background:linear-gradient(90deg,transparent,var(--e2) 25%,var(--e2) 75%,transparent);opacity:0;transition:opacity .4s}
#nav.scrolled{height:54px;background:rgba(5,12,29,.9);backdrop-filter:blur(24px) saturate(1.5)}
[data-theme=light] #nav.scrolled{background:rgba(240,244,255,.9)}
#nav.scrolled::after{opacity:1}
#nav.hidden{transform:translateY(-100%)}
.nlogo{font-family:var(--fh);font-weight:800;font-size:1.15rem;letter-spacing:-.5px;cursor:pointer;justify-self:start;background:linear-gradient(135deg,var(--blue),var(--violet) 55%,var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;user-select:none}
.nlinks{list-style:none;display:flex;align-items:center;gap:2px}
.nlinks a{font-family:var(--fm);font-size:.63rem;letter-spacing:.09em;color:var(--mu1);padding:6px 11px;border-radius:5px;white-space:nowrap;display:flex;align-items:center;gap:5px;transition:color .2s,background .2s}
.nlinks a .ni{font-size:.55rem;color:var(--blue);opacity:.55}
.nlinks a:hover,.nlinks a.active{color:var(--tx);background:rgba(91,168,255,.08)}
.nlinks a.active{color:var(--blue)}
.nright{justify-self:end;display:flex;align-items:center;gap:10px}
.nbtn{font-family:var(--fm);font-size:.64rem;letter-spacing:.07em;padding:8px 16px;border-radius:5px;color:var(--blue);border:1px solid rgba(91,168,255,.3);transition:all .25s;white-space:nowrap}
.nbtn:hover{background:rgba(91,168,255,.12);color:#fff;box-shadow:var(--glow-blue);border-color:rgba(91,168,255,.5)}
.theme-toggle{width:34px;height:34px;border-radius:50%;border:1px solid var(--e2);background:var(--surf);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.82rem;transition:all .3s var(--sp)}
.theme-toggle:hover{border-color:var(--blue);transform:rotate(22deg) scale(1.12);box-shadow:0 0 16px rgba(91,168,255,.3)}
.sound-toggle{width:34px;height:34px;border-radius:50%;border:1px solid var(--e2);background:var(--surf);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.75rem;transition:all .3s var(--sp);font-family:var(--fm)}
.sound-toggle:hover{border-color:var(--amber);transform:scale(1.12)}
.burger{display:none;flex-direction:column;gap:5px;cursor:pointer}
.burger span{display:block;width:21px;height:1.5px;background:var(--tx);border-radius:2px;transition:all .32s var(--sp)}
.burger.open span:nth-child(1){transform:rotate(45deg) translate(4.5px,4.5px)}
.burger.open span:nth-child(2){opacity:0;transform:scaleX(0)}
.burger.open span:nth-child(3){transform:rotate(-45deg) translate(4.5px,-4.5px)}
#mobile-menu{position:fixed;inset:0;z-index:700;background:rgba(5,12,29,.97);backdrop-filter:blur(40px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:80px 24px 50px;transform:translateY(-100%);transition:transform .5s var(--sp)}
[data-theme=light] #mobile-menu{background:rgba(240,244,255,.97)}
#mobile-menu.open{transform:translateY(0)}
#mobile-menu a{font-family:var(--fh);font-size:clamp(1.5rem,6vw,2rem);font-weight:700;color:var(--mu1);padding:10px 36px;border-radius:6px;width:100%;max-width:280px;text-align:center;transition:color .2s,background .2s}
#mobile-menu a:hover{color:var(--blue);background:rgba(91,168,255,.07)}
#mobile-menu .m-cta{margin-top:28px;font-family:var(--fm);font-size:.75rem;color:var(--blue);border:1px solid rgba(91,168,255,.32);padding:12px 32px;border-radius:5px}
@media(max-width:900px){#nav{padding:0 20px;grid-template-columns:1fr auto}#nav::after{left:20px;right:20px}.nlinks,.nbtn{display:none}.nright{gap:6px}.burger{display:flex}#dot-nav{display:none}#dock{display:none}}
@media(min-width:901px){#mobile-menu{display:none!important}}

/* SECTIONS */
section{position:relative;z-index:3;padding:110px 52px}
.ey{font-family:var(--fm);font-size:.63rem;letter-spacing:.3em;text-transform:uppercase;color:var(--blue);display:flex;align-items:center;gap:12px;margin-bottom:12px}
.ey::before{content:'';width:26px;height:1px;background:var(--blue);opacity:.5}
h2.sec-title{font-family:var(--fh);font-weight:800;letter-spacing:-.04em;line-height:1.1;font-size:clamp(2.2rem,3.8vw,3.4rem);margin-bottom:56px}
h2.sec-title em{font-style:normal;color:var(--blue)}
.div{height:1px;margin:0 52px;background:linear-gradient(90deg,transparent,var(--e2) 20%,var(--e2) 80%,transparent)}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.reveal{opacity:0;transform:translateY(26px);transition:opacity .7s ease,transform .7s var(--sp)}
.reveal.visible{opacity:1;transform:none}

/* HERO */
#hero{min-height:100vh;padding:140px 52px 90px;display:grid;grid-template-columns:1fr 460px;align-items:center;gap:72px;overflow:hidden}
.h-avail{display:inline-flex;align-items:center;gap:10px;font-family:var(--fm);font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--teal);margin-bottom:38px;opacity:0;animation:fadeUp .7s .1s var(--sp) forwards}
.h-pulse{position:relative;width:10px;height:10px}
.h-pulse::before{content:'';position:absolute;inset:0;border-radius:50%;background:var(--teal)}
.h-pulse::after{content:'';position:absolute;inset:0;border-radius:50%;border:1.5px solid var(--teal);animation:pout 2.3s ease-out infinite}
@keyframes pout{0%{transform:scale(1);opacity:.8}100%{transform:scale(3);opacity:0}}
.h-name{font-family:var(--fh);font-weight:800;font-size:clamp(3rem,5.5vw,5.3rem);letter-spacing:-.05em;line-height:1.05;margin-bottom:26px;opacity:0;animation:fadeUp .9s .2s var(--sp) forwards}
.h-name .grad{display:block;margin-top:6px;background:linear-gradient(135deg,var(--blue),var(--violet) 50%,var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;background-size:200% auto;animation:gshift 5s linear infinite}
@keyframes gshift{0%{background-position:0% center}100%{background-position:200% center}}
.h-role{display:inline-flex;align-items:center;gap:8px;font-family:var(--fm);font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--mu1);padding:8px 16px;border-radius:5px;border:1px solid var(--e1);background:rgba(11,24,41,.7);margin-bottom:26px;opacity:0;animation:fadeUp .8s .36s var(--sp) forwards}
[data-theme=light] .h-role{background:rgba(255,255,255,.7)}
.h-role::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--blue);box-shadow:0 0 8px var(--blue)}
.h-desc{font-size:clamp(.9rem,1.1vw,1rem);font-weight:300;color:var(--mu1);line-height:1.88;max-width:480px;margin-bottom:40px;opacity:0;animation:fadeUp .8s .48s var(--sp) forwards}
.h-desc strong{color:var(--tx);font-weight:400}
.h-btns{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:52px;opacity:0;animation:fadeUp .8s .6s var(--sp) forwards}
.btn-primary{font-family:var(--fm);font-size:.74rem;letter-spacing:.07em;padding:13px 28px;border-radius:6px;cursor:pointer;background:linear-gradient(135deg,var(--blue2),var(--violet));color:#fff;position:relative;overflow:hidden;transition:transform .3s var(--sp),box-shadow .3s}
.btn-primary::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--blue),var(--teal));opacity:0;transition:opacity .3s}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 18px 50px rgba(91,168,255,.35)}
.btn-primary:hover::before{opacity:1}
.btn-primary span{position:relative;z-index:1}
.btn-ghost{font-family:var(--fm);font-size:.74rem;letter-spacing:.07em;padding:13px 28px;border-radius:6px;cursor:pointer;color:var(--mu1);border:1px solid var(--e2);transition:all .25s var(--sp)}
.btn-ghost:hover{color:var(--tx);border-color:var(--teal);background:rgba(45,212,191,.06);transform:translateY(-3px)}
.h-stats{display:flex;gap:2px;opacity:0;animation:fadeUp .8s .72s var(--sp) forwards}
.hstat{flex:1;background:rgba(11,24,41,.65);border:1px solid var(--e1);padding:17px 14px;backdrop-filter:blur(12px);transition:border-color .3s;position:relative;overflow:hidden;cursor:default}
[data-theme=light] .hstat{background:rgba(255,255,255,.75)}
.hstat::before{content:'';position:absolute;bottom:0;left:0;right:0;height:1.5px;background:linear-gradient(90deg,var(--blue),var(--teal));transform:scaleX(0);transform-origin:left;transition:transform .38s var(--sp)}
.hstat:hover{border-color:var(--e2)}
.hstat:hover::before{transform:scaleX(1)}
.hstat-n{font-family:var(--fh);font-size:1.5rem;font-weight:800;line-height:1;background:linear-gradient(135deg,var(--blue),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.hstat-l{font-family:var(--fm);font-size:.58rem;color:var(--mu2);letter-spacing:.12em;text-transform:uppercase}

/* Hero right */
.hero-right{display:flex;flex-direction:column;gap:13px;opacity:0;animation:fadeUp .9s .28s var(--sp) forwards}
.code-card{background:var(--surf);border:1px solid var(--e1);border-radius:12px;overflow:hidden;position:relative}
.code-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(167,139,250,.6) 30%,rgba(91,168,255,.6) 60%,transparent)}
.cc-bar{padding:11px 15px;display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--e1)}
.cc-dots{display:flex;gap:5px}
.cc-dot{width:10px;height:10px;border-radius:50%}
.cc-dot:nth-child(1){background:#ff5f57}
.cc-dot:nth-child(2){background:#febc2e}
.cc-dot:nth-child(3){background:#28c840}
.cc-fname{font-family:var(--fm);font-size:.62rem;color:var(--mu2);margin-left:auto}
.cc-body{padding:17px 20px;font-family:var(--fm);font-size:.74rem;line-height:2}
.t-kw{color:var(--violet)}.t-str{color:var(--teal)}.t-fn{color:var(--blue)}.t-prop{color:var(--pink)}.t-num{color:var(--amber)}.t-cm{color:var(--mu2)}
.t-cursor{display:inline-block;width:2px;height:.88em;background:var(--teal);margin-left:1px;animation:blink 1s ease-in-out infinite;vertical-align:middle}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
/* 3D orbit widget */
.orbit-widget{background:var(--surf);border:1px solid var(--e1);border-radius:12px;padding:18px;height:160px;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.orbit-center{font-family:var(--fh);font-size:.85rem;font-weight:700;color:var(--blue);position:relative;z-index:2;text-shadow:0 0 20px rgba(91,168,255,.5)}
.orbit-ring{position:absolute;border-radius:50%;border:1px dashed;animation:orbitSpin linear infinite;transform-style:preserve-3d}
.orbit-ring:nth-child(1){width:120px;height:120px;border-color:rgba(91,168,255,.25);animation-duration:8s}
.orbit-ring:nth-child(2){width:170px;height:170px;border-color:rgba(167,139,250,.2);animation-duration:13s;animation-direction:reverse}
.orbit-ring:nth-child(3){width:220px;height:220px;border-color:rgba(45,212,191,.15);animation-duration:18s}
@keyframes orbitSpin{from{transform:rotate(0deg) rotateX(70deg)}to{transform:rotate(360deg) rotateX(70deg)}}
.orbit-node{position:absolute;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;border:1px solid var(--e2);background:var(--surf2);animation:nodeFloat 3s ease-in-out infinite;cursor:pointer;transition:box-shadow .2s}
.orbit-node:hover{box-shadow:0 0 16px var(--blue)}
@keyframes nodeFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
/* hero mini stats */
.mini-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.ms{background:var(--surf);border:1px solid var(--e1);padding:20px 14px;text-align:center;transition:border-color .3s,transform .3s var(--sp);cursor:default;overflow:hidden;position:relative}
.ms::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue),var(--teal));transform:scaleX(0);transform-origin:left;transition:transform .38s var(--sp)}
.ms:hover{border-color:var(--e2);transform:translateY(-4px)}
.ms:hover::after{transform:scaleX(1)}
.ms-n{font-family:var(--fh);font-size:1.9rem;font-weight:800;line-height:1;background:linear-gradient(135deg,var(--blue),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:4px}
.ms-l{font-family:var(--fm);font-size:.57rem;color:var(--mu2);letter-spacing:.12em;text-transform:uppercase}
.scroll-hint{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;opacity:0;animation:fadeUp .8s 1.4s var(--sp) forwards}
.scroll-hint span{font-family:var(--fm);font-size:.59rem;letter-spacing:.2em;text-transform:uppercase;color:var(--mu2)}
.scroll-mouse{width:20px;height:32px;border:1.5px solid rgba(91,168,255,.3);border-radius:11px;display:flex;justify-content:center;padding-top:5px}
.scroll-wheel{width:2.5px;height:5px;background:var(--blue);border-radius:2px;animation:sw 1.8s ease-in-out infinite}
@keyframes sw{0%,100%{transform:translateY(0);opacity:1}60%{transform:translateY(10px);opacity:0}}

/* TERMINAL */
.terminal{background:rgba(5,9,18,.96);border:1px solid rgba(45,212,191,.25);border-radius:12px;overflow:hidden;font-family:var(--fm)}
.term-bar{padding:11px 15px;background:rgba(255,255,255,.025);border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:8px}
.term-dot{width:10px;height:10px;border-radius:50%}
.term-dot:nth-child(1){background:#ff5f57}.term-dot:nth-child(2){background:#febc2e}.term-dot:nth-child(3){background:#28c840}
.term-title{font-size:.62rem;color:var(--mu2);margin-left:auto}
.term-body{padding:14px 18px;font-size:.74rem;line-height:1.85;min-height:200px;max-height:280px;overflow-y:auto}
.term-body::-webkit-scrollbar{width:2px}
.term-line{display:flex;gap:10px;margin-bottom:4px}
.term-prompt{color:var(--teal);flex-shrink:0}
.term-out{color:var(--mu1);word-break:break-word}
.term-out.success{color:var(--green)}
.term-out.error{color:var(--red)}
.term-out.info{color:var(--blue)}
.term-out.highlight{color:var(--amber)}
.term-input-row{display:flex;gap:10px;align-items:center;border-top:1px solid rgba(255,255,255,.05);padding:10px 18px}
.term-input-prompt{color:var(--teal);font-size:.74rem;font-family:var(--fm);flex-shrink:0}
.term-input{flex:1;background:transparent;font-family:var(--fm);font-size:.74rem;color:var(--tx);caret-color:var(--teal)}

/* ABOUT+SKILLS */
#about-skills{background:var(--bg2)}
.as-grid{display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:start;margin-bottom:72px}
.about-p{font-size:.96rem;font-weight:300;line-height:1.9;color:var(--mu1);margin-bottom:18px}
.about-p strong{color:var(--tx);font-weight:400}
.about-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.astat{background:var(--surf);border:1px solid var(--e1);border-radius:10px;padding:26px 20px;text-align:center;position:relative;overflow:hidden;transition:transform .35s var(--sp),border-color .3s;cursor:default}
.astat::before{content:'';position:absolute;inset:0;background:radial-gradient(180px circle at 50% 0%,rgba(91,168,255,.07),transparent 70%)}
.astat:hover{transform:translateY(-5px);border-color:var(--e2)}
.astat-n{font-family:var(--fh);font-size:2.5rem;font-weight:800;line-height:1;margin-bottom:7px;background:linear-gradient(135deg,var(--blue),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.astat-l{font-family:var(--fm);font-size:.6rem;color:var(--mu1);letter-spacing:.13em;text-transform:uppercase}

/* MARQUEE */
.marquee-wrap{position:relative;overflow:hidden;margin-bottom:44px}
.marquee-wrap::before,.marquee-wrap::after{content:'';position:absolute;top:0;bottom:0;width:100px;z-index:2;pointer-events:none}
.marquee-wrap::before{left:0;background:linear-gradient(90deg,var(--bg2),transparent)}
.marquee-wrap::after{right:0;background:linear-gradient(-90deg,var(--bg2),transparent)}
.mq-track{display:flex;gap:9px;width:max-content;animation:mqRun 26s linear infinite}
.mq-track:hover{animation-play-state:paused}
@keyframes mqRun{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.mq-item{display:flex;align-items:center;gap:8px;padding:9px 18px;background:var(--surf);border:1px solid var(--e1);border-radius:7px;font-family:var(--fm);font-size:.71rem;color:var(--mu1);white-space:nowrap;transition:border-color .25s,color .25s,transform .25s var(--sp)}
.mq-item:hover{border-color:var(--blue);color:var(--tx);transform:translateY(-3px)}
.mq-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* SKILL TABS */
.tabs{display:flex;gap:2px;margin-bottom:2px;flex-wrap:wrap}
.tab-btn{font-family:var(--fm);font-size:.63rem;letter-spacing:.07em;padding:9px 17px;background:var(--surf);border:1px solid var(--e1);color:var(--mu1);cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.tab-btn::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1.5px;background:linear-gradient(90deg,var(--violet),var(--blue));transform:scaleX(0);transition:transform .3s var(--sp)}
.tab-btn:hover{color:var(--tx);border-color:var(--e2)}
.tab-btn.active{background:rgba(91,168,255,.1);border-color:rgba(91,168,255,.3);color:var(--blue)}
.tab-btn.active::after{transform:scaleX(1)}
.tab-panel{display:none}.tab-panel.active{display:block}
.skgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:2px}
.skcard{background:var(--surf);border:1px solid var(--e1);padding:26px;position:relative;overflow:hidden;transition:border-color .3s,transform .3s var(--sp)}
.skcard::after{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(300px circle at var(--mx,50%) var(--my,50%),rgba(91,168,255,.055),transparent 60%);opacity:0;transition:opacity .3s}
.skcard:hover{border-color:var(--e2);transform:translateY(-3px)}
.skcard:hover::after{opacity:1}
.skcard.feat{grid-column:span 2;background:linear-gradient(135deg,rgba(91,168,255,.07),rgba(167,139,250,.04));border-color:rgba(91,168,255,.2)}
.fbadge{display:inline-flex;align-items:center;gap:6px;font-family:var(--fm);font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);padding:3px 10px;border-radius:20px;background:rgba(45,212,191,.1);border:1px solid rgba(45,212,191,.24);margin-bottom:11px}
.skt{font-family:var(--fh);font-size:.9rem;font-weight:700;margin-bottom:4px}
.sks{font-family:var(--fm);font-size:.6rem;color:var(--mu2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px}
.tags{display:flex;flex-wrap:wrap;gap:6px}
.tag{font-family:var(--fm);font-size:.62rem;padding:4px 10px;border-radius:4px;letter-spacing:.04em;cursor:default;position:relative;overflow:hidden;transition:transform .2s,filter .2s}
.tag:hover{transform:translateY(-2px) scale(1.05);filter:brightness(1.2)}
.tb{background:rgba(91,168,255,.12);color:#93c5fd;border:1px solid rgba(91,168,255,.22)}
.tp{background:rgba(244,114,182,.12);color:#fbcfe8;border:1px solid rgba(244,114,182,.22)}
.tg{background:rgba(45,212,191,.12);color:#5eead4;border:1px solid rgba(45,212,191,.22)}
.tv{background:rgba(167,139,250,.12);color:#c4b5fd;border:1px solid rgba(167,139,250,.22)}
.ta{background:rgba(251,191,36,.12);color:#fde68a;border:1px solid rgba(251,191,36,.22)}
.bars{margin-top:22px;display:flex;flex-direction:column;gap:14px}
.bar-row{cursor:default}
.bar-meta{display:flex;justify-content:space-between;margin-bottom:6px}
.bar-name{font-family:var(--fm);font-size:.7rem;color:var(--tx)}
.bar-pct{font-family:var(--fm);font-size:.67rem;color:var(--blue)}
.bar-track{height:2px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;width:0;border-radius:2px;background:linear-gradient(90deg,var(--violet),var(--blue),var(--teal));transition:width 1.8s var(--sp);position:relative}
.bar-fill::after{content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);width:7px;height:7px;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal)}
/* rings */
.rings{display:flex;gap:24px;flex-wrap:wrap;justify-content:center;margin-top:56px;padding-top:48px;border-top:1px solid var(--e1)}
.ring-item{display:flex;flex-direction:column;align-items:center;gap:9px;cursor:default}
.ring-item:hover svg{filter:drop-shadow(0 0 14px rgba(91,168,255,.55))}
.ring-svg{transform:rotate(-90deg);transition:filter .3s}
.ring-bg{fill:none;stroke:rgba(255,255,255,.05)}
.ring-fg{fill:none;stroke-linecap:round;stroke-dashoffset:226;transition:stroke-dashoffset 2.2s var(--sp)}
.ring-txt{fill:var(--tx);font-family:var(--fh);font-weight:700;font-size:11.5px;text-anchor:middle;dominant-baseline:central;transform:rotate(90deg);transform-origin:center}
.ring-lbl{font-family:var(--fm);font-size:.62rem;color:var(--mu1);letter-spacing:.06em;text-align:center}

/* ═══ PROJECTS — APPLE STYLE ═══ */
#projects{background:var(--bg);padding:120px 0}
.proj-eyebrow{padding:0 52px;margin-bottom:0}
.proj-headline{font-family:var(--fh);font-weight:800;font-size:clamp(2.8rem,5.5vw,5rem);letter-spacing:-.04em;line-height:1.08;padding:0 52px;margin-bottom:72px;color:var(--tx)}
.proj-headline em{font-style:normal;background:linear-gradient(135deg,var(--blue),var(--violet) 50%,var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* ── FEATURED PROJECT SPOTLIGHT ── */
.proj-featured-wrapper{
  position:relative;margin:0 0 3px;
}
/* Glowing top border — signals this is THE project */
.proj-featured-wrapper::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;z-index:10;
  background:linear-gradient(90deg,transparent 0%,var(--blue) 20%,var(--violet) 50%,var(--pink) 80%,transparent 100%);
  box-shadow:0 0 24px rgba(91,168,255,.5);
}
/* Subtle ambient glow around the whole card */
.proj-featured-wrapper::after{
  content:'';position:absolute;inset:-1px;z-index:-1;
  background:linear-gradient(135deg,rgba(91,168,255,.08),rgba(167,139,250,.06),rgba(244,114,182,.04));
  border-radius:0;pointer-events:none;
}
/* Featured label crown */
.proj-featured-crown{
  position:absolute;top:-13px;left:52px;z-index:20;
  display:inline-flex;align-items:center;gap:7px;
  font-family:var(--fm);font-size:.6rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;
  background:linear-gradient(135deg,var(--blue),var(--violet));
  color:#fff;padding:5px 14px;border-radius:20px;
  box-shadow:0 4px 20px rgba(91,168,255,.35);
  white-space:nowrap;
}
.proj-featured-crown::before{content:'★ ';font-size:.7rem}


.proj-hero{position:relative;margin:0 0 3px;overflow:hidden;cursor:pointer}
.proj-hero-inner{position:relative;min-height:72vh;display:grid;grid-template-columns:1fr 1fr;align-items:center;gap:0;background:var(--surf);transition:background .4s}
.proj-hero:hover .proj-hero-inner{background:var(--surf2)}
.proj-hero-visual{position:relative;overflow:hidden;min-height:72vh;display:flex;align-items:center;justify-content:center}
.proj-hero-canvas{position:absolute;inset:0}
.proj-hero-emoji{font-size:clamp(5rem,10vw,9rem);position:relative;z-index:2;filter:drop-shadow(0 0 60px rgba(91,168,255,.4));transition:transform .6s var(--sp);animation:heroFloat 4s ease-in-out infinite}
.proj-hero:hover .proj-hero-emoji{transform:scale(1.07)}
@keyframes heroFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.proj-hero-content{padding:72px 64px;display:flex;flex-direction:column;justify-content:center}
.proj-hero-badge{display:inline-flex;align-items:center;gap:7px;font-family:var(--fm);font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--teal);margin-bottom:20px}
.proj-hero-badge::before{content:'';width:18px;height:1px;background:var(--teal)}
.proj-hero-num{font-family:var(--fm);font-size:.62rem;color:var(--mu2);letter-spacing:.2em;text-transform:uppercase;margin-bottom:16px}
.proj-hero-title{font-family:var(--fh);font-size:clamp(1.8rem,3.2vw,3rem);font-weight:800;letter-spacing:-.04em;line-height:1.1;margin-bottom:20px;color:var(--tx)}
.proj-hero-desc{font-size:clamp(.9rem,1.1vw,1.05rem);font-weight:300;color:var(--mu1);line-height:1.85;margin-bottom:28px;max-width:420px}
.proj-hero-stack{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:32px}
.proj-hero-links{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.proj-btn-primary{font-family:var(--fm);font-size:.7rem;letter-spacing:.07em;padding:12px 24px;border-radius:24px;background:var(--blue);color:#fff;transition:all .28s var(--sp);white-space:nowrap;display:inline-flex;align-items:center;gap:8px}
.proj-btn-primary:hover{background:var(--blue2);transform:scale(1.03);box-shadow:0 12px 32px rgba(91,168,255,.35)}
.proj-btn-ghost{font-family:var(--fm);font-size:.7rem;letter-spacing:.07em;padding:12px 22px;border-radius:24px;border:1px solid var(--e2);color:var(--mu1);transition:all .28s var(--sp);white-space:nowrap}
.proj-btn-ghost:hover{border-color:var(--blue);color:var(--tx);background:rgba(91,168,255,.07)}
/* hero background animation canvas inline */
.proj-hero-bg{position:absolute;inset:0;z-index:1;pointer-events:none}

/* ── PROJECT GRID (3-column + 2-column bento) ── */
.proj-bento{display:grid;grid-template-columns:repeat(12,1fr);grid-auto-rows:auto;gap:3px;padding:0}

/* Card sizes via col spans */
.pbc{position:relative;overflow:hidden;cursor:pointer;background:var(--surf);transition:background .35s}
.pbc:hover{background:var(--surf2)}
.pbc-s{grid-column:span 4}  /* small — 4/12 */
.pbc-m{grid-column:span 6}  /* medium — 6/12 */
.pbc-l{grid-column:span 8}  /* large — 8/12 */
.pbc-xl{grid-column:span 12} /* full width */

/* Inner layout */
.pbc-inner{padding:44px 40px;height:100%;display:flex;flex-direction:column;justify-content:space-between;min-height:360px;position:relative}
.pbc-s .pbc-inner{padding:36px 30px;min-height:300px}

/* Visual area */
.pbc-visual{position:absolute;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.pbc-gradient{position:absolute;inset:0;opacity:.55;transition:opacity .4s}
.pbc:hover .pbc-gradient{opacity:.75}
.pbc-emoji{position:absolute;bottom:-10px;right:-10px;font-size:clamp(4rem,7vw,6.5rem);opacity:.18;transition:all .5s var(--sp);pointer-events:none;filter:blur(.5px)}
.pbc:hover .pbc-emoji{opacity:.28;transform:scale(1.06) translate(-6px,-6px)}
.pbc-lines{position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(91,168,255,.025) 40px,rgba(91,168,255,.025) 41px),repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(91,168,255,.025) 40px,rgba(91,168,255,.025) 41px);opacity:0;transition:opacity .4s}
.pbc:hover .pbc-lines{opacity:1}

/* Content */
.pbc-content{position:relative;z-index:1}
.pbc-num{font-family:var(--fm);font-size:.58rem;color:var(--mu2);letter-spacing:.22em;text-transform:uppercase;margin-bottom:14px}
.pbc-title{font-family:var(--fh);font-size:clamp(1.1rem,1.8vw,1.55rem);font-weight:800;letter-spacing:-.02em;line-height:1.2;margin-bottom:10px;color:var(--tx)}
.pbc-s .pbc-title{font-size:1.15rem}
.pbc-desc{font-size:.84rem;font-weight:300;color:var(--mu1);line-height:1.8;margin-bottom:0}

/* Bottom bar */
.pbc-foot{position:relative;z-index:1;display:flex;align-items:flex-end;justify-content:space-between;margin-top:24px;gap:12px}
.pbc-stack{display:flex;flex-wrap:wrap;gap:5px}
.pbc-tag{font-family:var(--fm);font-size:.58rem;padding:3px 9px;border-radius:20px;letter-spacing:.04em;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--mu1);transition:all .2s}
.pbc:hover .pbc-tag{border-color:var(--e2);color:var(--tx)}
.pbc-arrow{width:36px;height:36px;border-radius:50%;border:1px solid var(--e2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .28s var(--sp);color:var(--mu1);font-size:.8rem}
.pbc:hover .pbc-arrow{background:var(--blue);border-color:var(--blue);color:#fff;transform:rotate(45deg)}

/* Status pill */
.pbc-status{display:inline-flex;align-items:center;gap:5px;font-family:var(--fm);font-size:.57rem;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border-radius:12px;margin-bottom:12px}
.pbc-status.live{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.22)}
.pbc-status.wip{background:rgba(251,191,36,.1);color:var(--amber);border:1px solid rgba(251,191,36,.2)}
.pbc-status.soon{background:rgba(167,139,250,.1);color:var(--violet);border:1px solid rgba(167,139,250,.2)}
.pbc-status.live::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:lp2 2s ease-in-out infinite}
@keyframes lp2{0%,100%{box-shadow:0 0 0 0 rgba(52,211,153,.5)}50%{box-shadow:0 0 0 4px rgba(52,211,153,0)}}

/* Hover reveal link */
.pbc-link{position:absolute;bottom:36px;right:36px;font-family:var(--fm);font-size:.65rem;letter-spacing:.08em;color:var(--blue);opacity:0;transform:translateY(6px);transition:all .28s var(--sp);display:flex;align-items:center;gap:5px;text-decoration:none;z-index:5}
.pbc:hover .pbc-link{opacity:1;transform:translateY(0)}
.pbc-link::after{content:'↗';transition:transform .2s}
.pbc-link:hover::after{transform:translate(2px,-2px)}

/* Scroll indicator strip */
.proj-cta-strip{padding:52px 52px 0;display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap}
.proj-cta-text{font-family:var(--fm);font-size:.72rem;color:var(--mu2);letter-spacing:.08em}
.proj-cta-link{font-family:var(--fm);font-size:.72rem;color:var(--blue);letter-spacing:.07em;display:flex;align-items:center;gap:7px;transition:gap .3s,color .3s}
.proj-cta-link:hover{gap:13px;color:var(--teal)}
.proj-cta-link::after{content:'→'}

@media(max-width:1100px){
  .proj-hero-inner{grid-template-columns:1fr}
  .proj-hero-visual{min-height:40vh}
  .proj-hero-content{padding:52px 40px}
  .pbc-s{grid-column:span 6}
  .pbc-m{grid-column:span 6}
  .pbc-l{grid-column:span 12}
}
@media(max-width:768px){
  .proj-headline,.proj-eyebrow,.proj-cta-strip{padding:0 28px}
  .pbc-s,.pbc-m,.pbc-l,.pbc-xl{grid-column:span 12}
  .pbc-inner{min-height:260px;padding:28px 24px}
  .pbc-feat-inner{grid-template-columns:1fr!important}
}
@media(max-width:480px){
  .proj-headline{font-size:2.4rem;letter-spacing:-.03em}
  .proj-hero-visual{min-height:30vh}
}

/* JOURNEY */
#journey{background:var(--bg2)}
.journey-grid{display:grid;grid-template-columns:1fr 1fr;gap:72px}
.tl-sub{font-family:var(--fm);font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--mu2);margin-bottom:22px}
.tl{position:relative;padding-left:40px}
.tl::before{content:'';position:absolute;left:0;top:10px;bottom:0;width:1px;background:linear-gradient(to bottom,var(--blue),var(--violet),var(--pink),transparent 90%)}
.tle{position:relative;margin-bottom:46px;opacity:0;transform:translateX(-18px);transition:opacity .6s,transform .6s var(--sp)}
.tle.visible{opacity:1;transform:none}
.tle::before{content:'';position:absolute;left:-44px;top:7px;width:9px;height:9px;border-radius:50%;background:var(--blue);box-shadow:0 0 16px var(--blue);border:2px solid var(--bg2)}
.tl-date{font-family:var(--fm);font-size:.63rem;letter-spacing:.14em;color:var(--teal);text-transform:uppercase;margin-bottom:5px}
.tl-role{font-family:var(--fh);font-size:1.1rem;font-weight:700;margin-bottom:4px}
.tl-org{font-family:var(--fm);font-size:.68rem;color:var(--pink);margin-bottom:10px}
.tl-desc{font-size:.86rem;font-weight:300;color:var(--mu1);line-height:1.85}
.cert-list{display:flex;flex-direction:column;gap:9px}
.cert-card{background:var(--surf);border:1px solid var(--e1);padding:14px 18px;display:flex;gap:12px;align-items:center;position:relative;overflow:hidden;transition:transform .28s var(--sp),border-color .28s}
.cert-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;background:linear-gradient(90deg,var(--violet),var(--blue),var(--teal));transform:scaleX(0);transform-origin:left;transition:transform .4s var(--sp)}
.cert-card:hover{transform:translateX(5px);border-color:var(--e2)}
.cert-card:hover::before{transform:scaleX(1)}
.cert-icon{width:36px;height:36px;border-radius:7px;background:rgba(91,168,255,.09);border:1px solid var(--e1);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo, createContext, useContext, useReducer } = React;

/* ══════════════════════════════════════════
   CUSTOM HOOKS
══════════════════════════════════════════ */
function useMousePosition() {
  const pos = useRef({ x: -999, y: -999 });
  useEffect(() => {
    const h = e => { pos.current = { x: e.clientX, y: e.clientY }; };
    window.addEventListener('mousemove', h, { passive: true });
    return () => window.removeEventListener('mousemove', h);
  }, []);
  return pos;
}

function useScrollProgress() {
  const [prog, setProg] = useState(0);
  useEffect(() => {
    const h = () => {
      const p = window.scrollY / (document.body.scrollHeight - window.innerHeight);
      setProg(Math.min(p * 100, 100));
    };
    window.addEventListener('scroll', h, { passive: true });
    return () => window.removeEventListener('scroll', h);
  }, []);
  return prog;
}

function useIntersection(ref, threshold = 0.1) {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    if (!ref.current) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setVisible(true); }, { threshold });
    obs.observe(ref.current);
    return () => obs.disconnect();
  }, [ref]);
  return visible;
}

function useCounter(target, suffix = '', duration = 1600) {
  const [val, setVal] = useState('0' + suffix);
  const start = useRef(null);
  const run = useCallback(() => {
    const step = ts => {
      if (!start.current) start.current = ts;
      const p = Math.min((ts - start.current) / duration, 1);
      const ease = 1 - Math.pow(1 - p, 4);
      setVal(Math.round(target * ease) + suffix);
      if (p < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }, [target, suffix, duration]);
  return [val, run];
}

function useTyping(words, speed = 80) {
  const [text, setText] = useState('');
  useEffect(() => {
    let wi = 0, ci = 0, del = false, timer;
    const run = () => {
      const w = words[wi];
      if (!del) {
        setText(w.slice(0, ++ci));
        if (ci === w.length) { del = true; timer = setTimeout(run, 1800); return; }
      } else {
        setText(w.slice(0, --ci));
        if (ci === 0) { del = false; wi = (wi + 1) % words.length; }
      }
      timer = setTimeout(run, del ? 32 : speed);
    };
    run();
    return () => clearTimeout(timer);
  }, []);
  return text;
}

/* ══════════════════════════════════════════
   CONTEXT & STATE
══════════════════════════════════════════ */
const AppCtx = createContext(null);
function appReducer(state, action) {
  switch (action.type) {
    case 'SET_THEME': return { ...state, dark: action.dark };
    case 'SET_SOUND': return { ...state, sound: action.sound };
    case 'SET_SECTION': return { ...state, activeSection: action.section };
    case 'SET_CURSOR': return { ...state, cursorMode: action.mode };
    default: return state;
  }
}

/* ══════════════════════════════════════════
   SOUND ENGINE (Web Audio API)
══════════════════════════════════════════ */
const AudioEngine = (() => {
  let ctx = null;
  const getCtx = () => { if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)(); return ctx; };
  const play = (freq, type = 'sine', dur = 0.08, vol = 0.04) => {
    try {
      const c = getCtx(); if (c.state === 'suspended') c.resume();
      const osc = c.createOscillator(), gain = c.createGain();
      osc.connect(gain); gain.connect(c.destination);
      osc.type = type; osc.frequency.setValueAtTime(freq, c.currentTime);
      gain.gain.setValueAtTime(vol, c.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + dur);
      osc.start(); osc.stop(c.currentTime + dur);
    } catch(e) {}
  };
  return {
    click: () => play(800, 'sine', 0.06, 0.03),
    hover: () => play(600, 'sine', 0.04, 0.015),
    success: () => { play(523, 'sine', 0.12, 0.04); setTimeout(() => play(659, 'sine', 0.1, 0.04), 80); setTimeout(() => play(784, 'sine', 0.14, 0.04), 160); },
    error: () => play(200, 'square', 0.14, 0.03),
    tab: () => play(440, 'triangle', 0.07, 0.025),
    type: () => play(1200 + Math.random() * 200, 'sine', 0.03, 0.008),
  };
})();

/* ══════════════════════════════════════════
   WEBGL BACKGROUND
══════════════════════════════════════════ */
function initWebGL() {
  const canvas = document.getElementById('webgl-bg');
  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  const resize = () => { canvas.width = innerWidth; canvas.height = innerHeight; gl.viewport(0, 0, innerWidth, innerHeight); };

  const VS = `attribute vec2 a;void main(){gl_Position=vec4(a,0,1);}`;
  const FS = `precision mediump float;uniform float t;uniform vec2 r;uniform vec2 m;
void main(){
  vec2 uv=gl_FragCoord.xy/r;
  vec2 mu=m/r;
  float d1=length(uv-vec2(.2+mu.x*.1,.8-mu.y*.1));
  float d2=length(uv-vec2(.8+sin(t*.3)*.15,.2+cos(t*.4)*.15));
  float d3=length(uv-vec2(.5+cos(t*.2)*.2,.5+sin(t*.5)*.18));
  float b1=smoothstep(.8,.0,d1)*0.09;
  float b2=smoothstep(.7,.0,d2)*0.07;
  float b3=smoothstep(.6,.0,d3)*0.05;
  vec3 c1=vec3(.36,.66,.99);vec3 c2=vec3(.66,.54,.98);vec3 c3=vec3(.18,.83,.75);
  vec3 col=c1*b1+c2*b2+c3*b3;
  gl_FragColor=vec4(col,1);
}`;
  const compile = (type, src) => { const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s); return s; };
  const prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER, VS));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, FS));
  gl.linkProgram(prog); gl.useProgram(prog);
  const buf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
  const aLoc = gl.getAttribLocation(prog, 'a');
  gl.enableVertexAttribArray(aLoc); gl.vertexAttribPointer(aLoc, 2, gl.FLOAT, false, 0, 0);
  const tLoc = gl.getUniformLocation(prog, 't');
  const rLoc = gl.getUniformLocation(prog, 'r');
  const mLoc = gl.getUniformLocation(prog, 'm');
  let mx = innerWidth/2, my = innerHeight/2;
  window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; }, { passive: true });
  let start = performance.now();
  const loop = () => {
    const t = (performance.now() - start) / 1000;
    gl.uniform1f(tLoc, t);
    gl.uniform2f(rLoc, canvas.width, canvas.height);
    gl.uniform2f(mLoc, mx, my);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(loop);
  };
  loop();
}

/* ══════════════════════════════════════════
   PARTICLE SYSTEM
══════════════════════════════════════════ */
function initParticles() {
  const c = document.getElementById('particle-canvas');
  const ctx = c.getContext('2d');
  let W, H, mouse = { x: -999, y: -999 };
  const resize = () => { W = c.width = innerWidth; H = c.height = innerHeight; };
  resize(); window.addEventListener('resize', resize, { passive: true });
  window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; }, { passive: true });
  class P {
    reset() { this.x = Math.random()*W; this.y = Math.random()*H; this.vx=(Math.random()-.5)*.09; this.vy=(Math.random()-.5)*.09; this.r=Math.random()*.7+.2; this.a=Math.random()*.08+.03; this.phase=Math.random()*Math.PI*2; }
    constructor() { this.reset(); }
    step() {
      this.phase+=.007;
      const alpha = this.a + Math.sin(this.phase)*.025;
      const dx=mouse.x-this.x, dy=mouse.y-this.y, d=Math.hypot(dx,dy);
      if (d<180&&d>0) { const f=(180-d)/180*.007; this.x+=dx*f; this.y+=dy*f; }
      this.x+=this.vx; this.y+=this.vy;
      if(this.x<0)this.x=W; if(this.x>W)this.x=0;
      if(this.y<0)this.y=H; if(this.y>H)this.y=0;
      ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(91,168,255,${alpha})`; ctx.fill();
    }
  }
  const pts = Array.from({length:60},()=>new P());
  const connect = () => {
    for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++){
      const d=Math.hypot(pts[i].x-pts[j].x, pts[i].y-pts[j].y);
      if(d<110) { ctx.beginPath(); ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y); ctx.strokeStyle=`rgba(91,168,255,${.02*(1-d/110)})`; ctx.lineWidth=.35; ctx.stroke(); }
    }
  };
  (function loop(){ ctx.clearRect(0,0,W,H); pts.forEach(p=>p.step()); connect(); requestAnimationFrame(loop); })();
}

/* ══════════════════════════════════════════
   MAGNETIC CURSOR ENGINE
══════════════════════════════════════════ */
function initCursor() {
  const dot   = document.getElementById('cur-dot');
  const ring  = document.getElementById('cur-ring');
  const glow  = document.getElementById('cur-glow');
  const label = document.getElementById('cur-label');
  if (!matchMedia('(hover:hover) and (pointer:fine)').matches) return;

  let cx = innerWidth/2, cy = innerHeight/2;
  let rx = cx, ry = cy, gx = cx, gy = cy;
  let activated = false;

  window.addEventListener('mousemove', e => {
    cx = e.clientX; cy = e.clientY;
    dot.style.left = cx + 'px'; dot.style.top = cy + 'px';
    label.style.left = (cx + 16) + 'px'; label.style.top = cy + 'px';
    if (!activated) {
      activated = true;
      document.body.classList.add('cur-active');
    }
  }, { passive: true });

  (function loop() {
    rx += (cx - rx) * .12; ry += (cy - ry) * .12;
    gx += (cx - gx) * .06; gy += (cy - gy) * .06;
    ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
    glow.style.left = gx + 'px'; glow.style.top = gy + 'px';
    requestAnimationFrame(loop);
  })();

  window.addEventListener('mousedown', () => {
    dot.style.transform  = 'translate(-50%,-50%) scale(.3)';
    ring.style.transform = 'translate(-50%,-50%) scale(.85)';
  });
  window.addEventListener('mouseup', () => {
    dot.style.transform  = 'translate(-50%,-50%) scale(1)';
    ring.style.transform = 'translate(-50%,-50%) scale(1)';
  });

  function resetCursor() {
    dot.style.width  = '6px'; dot.style.height = '6px';
    dot.style.borderRadius = '50%'; dot.style.opacity = '1';
    ring.style.width = '34px'; ring.style.height = '34px';
    ring.style.borderColor = 'rgba(91,168,255,.4)';
    label.style.opacity = '0';
  }
  function linkCursor() {
    dot.style.width  = '0'; dot.style.height = '0';
    ring.style.width = '46px'; ring.style.height = '46px';
    ring.style.borderColor = 'rgba(45,212,191,.65)';
    label.style.opacity = '0';
  }
  function projectCursor(txt) {
    dot.style.width  = '0'; dot.style.height = '0';
    ring.style.width = '62px'; ring.style.height = '62px';
    ring.style.borderColor = 'rgba(244,114,182,.55)';
    label.style.opacity = '1';
    label.textContent = txt || 'View';
  }
  function textCursor() {
    dot.style.width  = '2px'; dot.style.height = '18px';
    dot.style.borderRadius = '1px';
  }

  function attachHovers() {
    const done = '_chz';
    // Links, buttons, interactive elements → link cursor
    document.querySelectorAll('a, button, .dock-item, .tab-btn, .faq-q, .nbtn, .cv-btn, .cert-card, .astat, .hstat, .ms, .dn-dot').forEach(el => {
      if (el[done]) return; el[done] = true;
      el.addEventListener('mouseenter', linkCursor);
      el.addEventListener('mouseleave', resetCursor);
    });
    // Project cards → project cursor
    document.querySelectorAll('.pbc, .proj-hero-inner, .rv-card, .srv-card').forEach(el => {
      if (el[done]) return; el[done] = true;
      el.addEventListener('mouseenter', () => { projectCursor('View'); el._isProjCard = true; });
      el.addEventListener('mouseleave', () => { el._isProjCard = false; resetCursor(); });
    });
    // Text inputs → text cursor
    document.querySelectorAll('input, textarea').forEach(el => {
      if (el[done]) return; el[done] = true;
      el.addEventListener('mouseenter', textCursor);
      el.addEventListener('mouseleave', resetCursor);
      el.addEventListener('focus', textCursor);
      el.addEventListener('blur', resetCursor);
    });
  }

  setTimeout(attachHovers, 700);
  setInterval(attachHovers, 2500);
}

/* ── Live canvas animation for hero project ── */
function HeroCanvas() {
  const ref = useRef(null);
  useEffect(() => {
    const c = ref.current; if (!c) return;
    const ctx = c.getContext('2d');
    let W = c.width = c.offsetWidth, H = c.height = c.offsetHeight;
    const ro = new ResizeObserver(() => { W = c.width = c.offsetWidth; H = c.height = c.offsetHeight; });
    ro.observe(c);
    // Floating code lines
    const lines = Array.from({length:18}, () => ({
      x: Math.random()*W, y: Math.random()*H,
      text: ['const habiba = {}','<Portfolio/>','useState(magic)','CSS: ✨','React.render()','npm run dev','git push','Vercel deploy 🚀','⭐ 5-star','HTML · CSS · JS','class Developer','export default HZ','.animate({y:0})','flex-direction:🔥','border-radius:∞','z-index: 999'][Math.floor(Math.random()*16)],
      speed: .18 + Math.random()*.22,
      opacity: .04 + Math.random()*.09,
      size: 10 + Math.random()*4,
    }));
    let raf;
    const draw = () => {
      ctx.clearRect(0,0,W,H);
      ctx.font = '500 12px "JetBrains Mono", monospace';
      lines.forEach(l => {
        l.y -= l.speed;
        if (l.y < -30) { l.y = H + 20; l.x = Math.random()*W; }
        ctx.globalAlpha = l.opacity;
        ctx.fillStyle = '#5ba8ff';
        ctx.font = `500 ${l.size}px "JetBrains Mono", monospace`;
        ctx.fillText(l.text, l.x, l.y);
      });
      ctx.globalAlpha = 1;
      raf = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(raf); ro.disconnect(); };
  }, []);
  return <canvas ref={ref} className="proj-hero-canvas" style={{width:'100%',height:'100%'}}/>;
}

/* ── Per-card mini canvas animations ── */
function CardCanvas({ type }) {
  const ref = useRef(null);
  useEffect(() => {
    const c = ref.current; if (!c) return;
    const ctx = c.getContext('2d');
    let W = c.width = c.offsetWidth, H = c.height = c.offsetHeight;
    const ro = new ResizeObserver(() => { W = c.width = c.offsetWidth; H = c.height = c.offsetHeight; });
    ro.observe(c);
    let raf, t = 0;
    const draw = () => {
      ctx.clearRect(0,0,W,H);
      t += .008;
      if (type === 'portfolio') {
        // Floating code snippets drifting upward — matches this site's aesthetic
        const snippets = ['const habiba={}','<Portfolio/>','useState(✨)','CSS: magic','React.render()','npm run dev','git push','Vercel 🚀','⭐ 5-star','.animate()','.flex()','>_ terminal','WebGL','export default'];
        if (!c._lines) c._lines = snippets.map(txt => ({
          x: Math.random()*W, y: Math.random()*H,
          txt, speed: .15 + Math.random()*.2,
          alpha: .04 + Math.random()*.07,
          size: 10 + Math.random()*3,
        }));
        c._lines.forEach(l => {
          l.y -= l.speed;
          if (l.y < -20) { l.y = H + 10; l.x = Math.random()*W; }
          ctx.globalAlpha = l.alpha;
          ctx.fillStyle = Math.random() > .5 ? '#5ba8ff' : '#a78bfa';
          ctx.font = `500 ${l.size}px "JetBrains Mono", monospace`;
          ctx.fillText(l.txt, l.x, l.y);
        });
        ctx.globalAlpha = 1;
      } else if (type === 'restaurant') {
        // Warm wave lines
        for (let i = 0; i < 5; i++) {
          ctx.beginPath();
          ctx.moveTo(0, H*.3 + i*18);
          for (let x = 0; x <= W; x += 4) {
            ctx.lineTo(x, H*.3 + i*18 + Math.sin(x*.015 + t + i) * 14);
          }
          ctx.strokeStyle = `rgba(251,191,36,${.04 + i*.015})`;
          ctx.lineWidth = 1.2; ctx.stroke();
        }
      } else if (type === 'ecommerce') {
        // Grid dots product layout
        const cols = 4, rows = 3;
        for (let r = 0; r < rows; r++) for (let col = 0; col < cols; col++) {
          const x = (col+1)*W/(cols+1), y = (r+1)*H/(rows+1);
          const scale = .7 + Math.sin(t*1.2 + r*1.1 + col*.9)*.3;
          ctx.beginPath(); ctx.arc(x, y, 8*scale, 0, Math.PI*2);
          ctx.fillStyle = `rgba(244,114,182,${.08*scale})`;
          ctx.fill();
          ctx.strokeStyle = `rgba(244,114,182,${.14*scale})`;
          ctx.lineWidth = 1; ctx.stroke();
        }
      } else if (type === 'blog') {
        // Text lines flowing
        const lineH = 14;
        for (let i = 0; i < 7; i++) {
          const y = 20 + i*lineH + (t*14 % (H+lineH*7)) - lineH*7;
          const w = (W*.35 + W*.5*Math.abs(Math.sin(i*.7+t*.2))) % W;
          ctx.fillStyle = `rgba(167,139,250,${.06 + (i%3)*.025})`;
          ctx.fillRect(18, y, w, 5);
        }
      } else if (type === 'agency') {
        // Geometric shapes morphing
        ctx.save();
        ctx.translate(W/2, H/2);
        for (let i = 0; i < 3; i++) {
          ctx.rotate(t*.4 + i*Math.PI/1.5);
          ctx.strokeStyle = `rgba(45,212,191,${.08 + i*.03})`;
          ctx.lineWidth = 1;
          ctx.strokeRect(-30-i*14, -30-i*14, 60+i*28, 60+i*28);
        }
        ctx.restore();
      } else if (type === 'dashboard') {
        // Mini chart bars
        const bars = [.4,.7,.5,.9,.6,.8,.45,.75];
        bars.forEach((h, i) => {
          const animated = h + Math.sin(t*1.5 + i)*.1;
          const bw = W/(bars.length+1), bx = (i+.5)*bw, by = H*(1-animated*.7);
          const grad = ctx.createLinearGradient(bx, by, bx, H);
          grad.addColorStop(0, `rgba(91,168,255,.35)`);
          grad.addColorStop(1, `rgba(91,168,255,.05)`);
          ctx.fillStyle = grad;
          ctx.beginPath(); ctx.roundRect(bx - bw*.3, by, bw*.6, H-by, 3);
          ctx.fill();
        });
      }
      raf = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(raf); ro.disconnect(); };
  }, [type]);
  return <canvas ref={ref} style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:0}}/>;
}

function Reviews({ sound }) {
  const [current, setCurrent] = useState(0);
  const [dragging, setDragging] = useState(false);
  const dragStart = useRef(0), dragOffset = useRef(0);
  const trackRef = useRef(null);
  const reviews=[
    {stars:'★★★★★',text:'"Habiba delivered outstanding quality — the research was thorough and the writing was professional. Highly recommend!"',av:'JM',name:'James M.',role:'Business Owner · USA',grad:'linear-gradient(135deg,var(--blue),var(--violet))'},
    {stars:'★★★★★',text:'"Absolutely amazing work! Habiba understood the brief perfectly and delivered before the deadline. Will hire again!"',av:'SR',name:'Sarah R.',role:'Marketing Manager · UK',grad:'linear-gradient(135deg,var(--pink),var(--violet))'},
    {stars:'★★★★★',text:'"Creative, reliable, and communicates clearly. The final eBook exceeded my expectations. Great collaboration!"',av:'AK',name:'Ahmed K.',role:'Startup Founder · UAE',grad:'linear-gradient(135deg,var(--teal),var(--blue))'},
    {stars:'★★★★★',text:'"Fast delivery, excellent attention to detail, and great communication throughout the project."',av:'LK',name:'Lisa K.',role:'Content Director · Germany',grad:'linear-gradient(135deg,var(--amber),var(--pink))'},
  ];
  const goTo = i => { if(sound) AudioEngine.click(); setCurrent(Math.max(0,Math.min(i,reviews.length-1))); };
  const onPointerDown = e=>{ setDragging(true); dragStart.current=e.clientX; };
  const onPointerMove = e=>{ if(!dragging)return; dragOffset.current=e.clientX-dragStart.current; };
  const onPointerUp = ()=>{ if(!dragging)return; setDragging(false); if(dragOffset.current<-60)goTo(current+1); else if(dragOffset.current>60)goTo(current-1); dragOffset.current=0; };
  return (
    <section id="reviews">
      <div className="ey">Client Feedback</div>
      <h2 className="sec-title reveal">What Clients <em>Say.</em></h2>
      <div className={`carousel-wrap ${dragging?'dragging':''}`} onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp} onPointerLeave={onPointerUp}>
        <div className="carousel-track" ref={trackRef} style={{transform:`translateX(calc(-${current*356}px))`}}>
          {reviews.map((r,i)=>(
            <div key={i} className="rv-card" onMouseEnter={()=>sound&&AudioEngine.hover()}>
              <span className="rv-badge">Upwork</span>
              <div className="rv-stars">{r.stars}</div>
              <p className="rv-text">{r.text}</p>
              <div className="rv-author">
                <div className="rv-av" style={{background:r.grad}}>{r.av}</div>
                <div><div className="rv-name">{r.name}</div><div className="rv-role">{r.role}</div></div>
              </div>
            </div>
          ))}
        </div>
      </div>
      <div className="carousel-dots">
        {reviews.map((_,i)=><div key={i} className={`car-dot ${i===current?'active':''}`} onClick={()=>goTo(i)}/>)}
      </div>
    </section>
  );
}

  const [typing, setTyping] = useState(false);
  const [chars, setChars] = useState(0);
  const MAX = 500;
  const typingTimer = useRef(null);

  const update = (k,v) => {
    setForm(f=>({...f,[k]:v}));
    if(sound) AudioEngine.type();
    if(k==='msg') setChars(v.length);
    setTyping(true);
    clearTimeout(typingTimer.current);
    typingTimer.current = setTimeout(()=>setTyping(false),900);
  };

  const send = () => {
    if(!form.name||!form.email||!form.msg){showToast('Please fill in all fields');if(sound)AudioEngine.error();return;}
    const ml=`mailto:habibaazahid@gmail.com?subject=${encodeURIComponent(form.subject||'Portfolio Contact')}&body=${encodeURIComponent(`Name: ${form.name}\nEmail: ${form.email}\n\n${form.msg}`)}`;
    window.open(ml,'_blank');
    setSent(true); if(sound) AudioEngine.success(); showToast('Opening mail client… ✓');
    setTimeout(()=>setSent(false),3000);
  };

  const copyEmail = () => {
    navigator.clipboard.writeText('habibaazahid@gmail.com').then(()=>{showToast('Email copied! ✓');if(sound)AudioEngine.success();});
  };

  const charClass = chars>MAX?'over':chars>MAX*0.8?'warn':'';

  return (
    <section id="contact">
      <div className="ey" style={{justifyContent:'center'}}>Contact</div>
      <h2 className="ctit reveal"><span className="w1">Let's Build</span><span className="w2">Something.</span></h2>
      <p className="csub reveal">Open to remote frontend roles and freelance projects. My inbox is always open.</p>
      <div className="cform reveal">
        <div className="typing-indicator" style={{opacity:typing?1:0}}>Habiba is reading your message… ✨</div>
        <div className="cf-row">
          <div className="cf-field"><label className="cf-label">Your Name</label><input className="cf-input" placeholder="John Doe" value={form.name} onChange={e=>update('name',e.target.value)}/></div>
          <div className="cf-field"><label className="cf-label">Your Email</label><input className="cf-input" type="email" placeholder="john@email.com" value={form.email} onChange={e=>update('email',e.target.value)}/></div>
        </div>
        <div className="cf-row"><div className="cf-field full"><label className="cf-label">Subject</label><input className="cf-input" placeholder="Frontend role / Freelance project" value={form.subject} onChange={e=>update('subject',e.target.value)}/></div></div>
        <div className="cf-row"><div className="cf-field full"><label className="cf-label">Message</label><textarea className="cf-textarea" placeholder="Tell me about your project…" value={form.msg} onChange={e=>update('msg',e.target.value)}/><div className={`char-count ${charClass}`}>{chars}/{MAX}</div></div></div>
        <button className={`cf-send ${sent?'sent':''}`} onClick={send}><span>{sent?'✓ Sent! Opening mail…':'Send Message ↗'}</span></button>
      </div>
      <div className="cemail reveal" onClick={copyEmail}>habibaazahid@gmail.com ✉</div>
      <div className="socials reveal">
        {[
          ['⚡ GitHub','https://github.com/habibaazahid'],
          ['💼 LinkedIn','https://linkedin.com/in/habibazahid03'],
          ['✉️ Email','mailto:habibaazahid@gmail.com'],
          ['⭐ Upwork','https://www.upwork.com/freelancers/~habibazahid'],
        ].map(([l,h])=>(
          <a key={l} href={h} className="slink" target="_blank" rel="noopener" onClick={()=>sound&&AudioEngine.click()} onMouseEnter={()=>sound&&AudioEngine.hover()}>{l}</a>
        ))}
      </div>
    </section>
  );
}

/* ══════════════════════════════════════════
   LIVE TIME STRIP
══════════════════════════════════════════ */
function LiveStrip() {
  const [times, setTimes] = useState({main:'--:--',date:'',pk:'--:--',us:'--:--',uk:'--:--',de:'--:--'});
  useEffect(()=>{
    const update=()=>{
      const now=new Date();
      const fmt=tz=>new Intl.DateTimeFormat('en',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false,timeZone:tz}).format(now);
      const fmtDate=tz=>new Intl.DateTimeFormat('en',{weekday:'long',year:'numeric',month:'long',day:'numeric',timeZone:tz}).format(now);
      setTimes({main:fmt('Asia/Karachi'),date:fmtDate('Asia/Karachi'),pk:fmt('Asia/Karachi'),us:fmt('America/New_York'),uk:fmt('Europe/London'),de:fmt('Europe/Berlin')});
    };
    update(); const i=setInterval(update,1000); return()=>clearInterval(i);
  },[]);
  return (
    <div id="live-strip">
      <div>
        <div style={{fontFamily:'var(--fm)',fontSize:'.59rem',letterSpacing:'.2em',textTransform:'uppercase',color:'var(--mu2)',marginBottom:5}}>Current Time · Pakistan (PKT)</div>
        <div className="ls-main">{times.main}</div>
        <div className="ls-date">{times.date}</div>
      </div>
      <div className="ls-zones">
        {[['🇵🇰 PKT',times.pk],['🇺🇸 EST',times.us],['🇬🇧 GMT',times.uk],['🇩🇪 CET',times.de]].map(([tz,t])=>(
          <div key={tz} className="ls-zone"><div className="ls-tz">{tz}</div><div className="ls-tc">{t}</div></div>
        ))}
      </div>
    </div>
  );
}

function Footer() {
  const [t,setT]=useState('');
  useEffect(()=>{const i=setInterval(()=>setT(`${String(new Date().getHours()).padStart(2,'0')}:${String(new Date().getMinutes()).padStart(2,'0')} PKT`),1000);return()=>clearInterval(i);});
  return(
    <footer>
      <span>Designed &amp; Built by <a href="https://myportfolio.habibazahid.com">Habiba Zahid</a></span>
      <div className="footer-badge"><div className="footer-dot"/>Available for work · {t} · © {new Date().getFullYear()}</div>
    </footer>
  );
}

/* ══════════════════════════════════════════
   ROOT APP COMPONENT
══════════════════════════════════════════ */
const SECTIONS=[
  {id:'hero',label:'Hero'},{id:'about-skills',label:'About'},{id:'projects',label:'Projects'},
  {id:'journey',label:'Journey'},{id:'services',label:'Services'},{id:'reviews',label:'Reviews'},
  {id:'faq',label:'FAQ'},{id:'contact',label:'Contact'},
];

function App() {
  const [state, dispatch] = useReducer(appReducer, { dark:true, sound:true, activeSection:'hero', cursorMode:'default' });
  const [activeSection, setActiveSection] = useState('hero');

  const toggleTheme = () => {
    const newDark = !state.dark;
    dispatch({type:'SET_THEME',dark:newDark});
    document.documentElement.setAttribute('data-theme',newDark?'dark':'light');
    try{localStorage.setItem('hz-theme',newDark?'dark':'light');}catch(e){}
  };
  const toggleSound = () => dispatch({type:'SET_SOUND',sound:!state.sound});

  // Init theme
  useEffect(()=>{
    try{const s=localStorage.getItem('hz-theme');if(s==='light'){dispatch({type:'SET_THEME',dark:false});document.documentElement.setAttribute('data-theme','light');}}catch(e){}
  },[]);

  // Intersection observer for active section
  useEffect(()=>{
    const o=new IntersectionObserver(entries=>{ entries.forEach(e=>{ if(e.isIntersecting) setActiveSection(e.target.id); }); },{threshold:.35,rootMargin:'-20% 0px -20% 0px'});
    SECTIONS.forEach(s=>{ const el=document.getElementById(s.id); if(el) o.observe(el); });
    return()=>o.disconnect();
  },[]);

  // Scroll reveal
  useEffect(()=>{
    const o=new IntersectionObserver(entries=>entries.forEach((e,i)=>{ if(e.isIntersecting) setTimeout(()=>e.target.classList.add('visible'),i*55); },{threshold:.08}));
    document.querySelectorAll('.reveal').forEach(el=>o.observe(el));
    // re-run after render
    setTimeout(()=>document.querySelectorAll('.reveal').forEach(el=>o.observe(el)),500);
    return()=>o.disconnect();
  },[]);

  // Magnetic buttons
  useEffect(()=>{
    const addMagnet=(sel)=>{
      document.querySelectorAll(sel).forEach(btn=>{
        btn.addEventListener('mousemove',e=>{const r=btn.getBoundingClientRect();btn.style.transform=`translate(${(e.clientX-r.left-r.width/2)*.18}px,${(e.clientY-r.top-r.height/2)*.18}px)`;});
        btn.addEventListener('mouseleave',()=>btn.style.transform='');
      });
    };
    setTimeout(()=>addMagnet('.btn-primary,.btn-ghost,.nbtn,.slink,.cf-send'),1000);
  },[]);

  // Project card tilt
  useEffect(()=>{
    const add=()=>document.querySelectorAll('.proj-card').forEach(c=>{
      c.addEventListener('mousemove',e=>{const r=c.getBoundingClientRect();c.style.transform=`perspective(900px) rotateX(${-((e.clientY-r.top)/r.height-.5)*4}deg) rotateY(${((e.clientX-r.left)/r.width-.5)*4}deg) translateY(-6px)`;});
      c.addEventListener('mouseleave',()=>{c.classList.contains('feat')?c.style.transform='':c.style.transform='';});
    });
    setTimeout(add,800);
  },[]);

  return (
    <>
      <DotNav sections={SECTIONS} active={activeSection}/>
      <Dock sound={state.sound}/>
      <Navbar dark={state.dark} sound={state.sound} toggleTheme={toggleTheme} toggleSound={toggleSound} activeSection={activeSection}/>
      <Hero sound={state.sound}/>
      <div className="div"/>
      <AboutSkills sound={state.sound}/>
      <div className="div"/>
      <Projects sound={state.sound}/>
      <div className="div"/>
      <Journey sound={state.sound}/>
      <div className="div"/>
      <Services sound={state.sound}/>
      <div className="div"/>
      <Reviews sound={state.sound}/>
      <div className="div"/>
      <FAQ sound={state.sound}/>
      <div className="div"/>
      <Contact sound={state.sound}/>
      <LiveStrip/>
      <Footer/>
    </>
  );
}

/* ══════════════════════════════════════════
   BOOTSTRAP
══════════════════════════════════════════ */
// Progress counter
let pct = 0;
const pctEl = document.getElementById('ld-pct');
const pctInt = setInterval(()=>{ pct = Math.min(pct + Math.random()*12+3, 95); if(pctEl) pctEl.textContent=Math.round(pct)+'%'; },80);

window.addEventListener('load', () => {
  clearInterval(pctInt);
  if(pctEl) pctEl.textContent='100%';
  // Init all engines
  initWebGL();
  initParticles();
  initCursor();
  initSparkle();
  initKonami();
  initScrollProg();
  // Mount React
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App/>);
  // Hide loader
  setTimeout(()=>document.getElementById('loader').classList.add('out'),1800);
});
</script>
</body>
